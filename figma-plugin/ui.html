<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Catalog Importer</title>
  <style>
    :root {
      --bg: var(--figma-color-bg, #fff);
      --bg-secondary: var(--figma-color-bg-secondary, #f5f5f5);
      --text: var(--figma-color-text, #111827);
      --text-muted: var(--figma-color-text-secondary, #6b7280);
      --border: var(--figma-color-border, #d1d5db);
      --brand: var(--figma-color-bg-brand, #2563eb);
      --brand-hover: var(--figma-color-bg-brand-hover, #1d4ed8);
      --danger: var(--figma-color-bg-danger, #dc2626);
      --danger-hover: var(--figma-color-bg-danger-hover, #b91c1c);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans JP", "Hiragino Sans", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .app {
      padding: 16px;
    }

    .panel {
      display: grid;
      gap: 12px;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    p,
    li,
    label {
      font-size: 12px;
      line-height: 1.6;
    }

    p,
    ul {
      margin: 0;
      color: var(--text-muted);
    }

    label {
      font-weight: 700;
      color: var(--text);
    }

    textarea {
      width: 100%;
      min-height: 320px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      background: var(--bg);
      color: var(--text);
      font: 12px/1.6 Consolas, "Courier New", monospace;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .primary {
      background: var(--brand);
      color: #fff;
    }

    .primary:hover:not(:disabled) {
      background: var(--brand-hover);
    }

    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .danger {
      background: var(--danger);
      color: #fff;
    }

    .danger:hover:not(:disabled) {
      background: var(--danger-hover);
    }

    .status.error {
      color: #dc2626;
    }

    .render-host {
      position: fixed;
      left: -200vw;
      top: 0;
      width: 1920px;
      height: 2400px;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .render-host iframe {
      width: 1920px;
      height: 2400px;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <div>
        <h1>Component Catalog Importer</h1>
        <p>カタログの「Figma」ボタンでコピーしたJSONを貼り付けて、HTML/CSSレイアウトをFigmaレイヤーへ変換します。</p>
      </div>

      <div>
        <label for="json-input">コンポーネントJSON</label>
        <textarea id="json-input" spellcheck="false" placeholder='{
  "name": "コンポーネント名",
  "html": "<section>...</section>",
  "css": ".component { ... }"
}'></textarea>
      </div>

      <div class="actions">
        <button class="primary" id="btn-import" type="button">Figmaに展開</button>
        <button class="danger" id="btn-close" type="button">閉じる</button>
      </div>

      <p class="status" id="status">JSONを手動で貼り付けて「Figmaに展開」を押してください。</p>

      <ul>
        <li>JSONは入力欄をクリックして `Ctrl + V` で貼り付けてください。</li>
        <li>テキストは編集可能な `TextNode` として作成します。</li>
        <li>画像はURLから `Image` 塗りに変換します。取得できない場合はプレースホルダーになります。</li>
        <li>疑似要素と複雑な gradient は対象外です。</li>
      </ul>
    </section>
  </div>

  <div class="render-host" aria-hidden="true">
    <iframe id="render-frame" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>

  <script>
    'use strict';

    const VIEWPORT_WIDTH = 1920;
    const COMPONENT_CSS_VARIABLES = `
:root {
  --color-background: #fff;
  --color-font: #111;
  --color-primary: #333;
  --color-primary-shade: #111;
  --color-primary-tint: #666;
  --color-secondary: #aaa;
  --color-secondary-tint: #eee;
  --color-table-border: #ccc;
  --body-font-size: min(calc(1.6rem + (1vw - 1.92rem) * 0.1294), 1.6rem);
  --body-font-family: 'Noto Sans JP', sans-serif;
  --content-max-width: 1240px;
  --font-family01: 'Noto Sans JP', sans-serif;
  --font-family02: 'Oswald', 'Noto Sans JP', sans-serif;
  --px240: min(calc(240px + (1vw - 19.2px) * 10.3560), 240px);
  --px200: min(calc(200px + (1vw - 19.2px) * 6.4725), 200px);
  --px180: min(calc(180px + (1vw - 19.2px) * 3.8835), 180px);
  --px160w: min(calc(160px + (1vw - 19.2px) * 5.1780), 160px);
  --px160: min(calc(160px + (1vw - 19.2px) * 6.4725), 160px);
  --px150: min(calc(150px + (1vw - 19.2px) * 3.2362), 150px);
  --px140: min(calc(140px + (1vw - 19.2px) * 6.4725), 140px);
  --px120: min(calc(120px + (1vw - 19.2px) * 2.5890), 120px);
  --px100w: min(calc(100px + (1vw - 19.2px) * 3.2362), 100px);
  --px100: min(calc(100px + (1vw - 19.2px) * 3.8835), 100px);
  --px96: min(calc(96px + (1vw - 19.2px) * 3.1068), 96px);
  --px80w: min(calc(80px + (1vw - 19.2px) * 1.2945), 80px);
  --px80: min(calc(80px + (1vw - 19.2px) * 2.5890), 80px);
  --px80s: min(calc(80px + (1vw - 19.2px) * 3.8835), 80px);
  --px60w: min(calc(60px + (1vw - 19.2px) * 1.2945), 60px);
  --px60: min(calc(60px + (1vw - 19.2px) * 1.9417), 60px);
  --px50: min(calc(50px + (1vw - 19.2px) * 1.2945), 50px);
  --px40w: min(calc(40px + (1vw - 19.2px) * 0.6472), 40px);
  --px40: min(calc(40px + (1vw - 19.2px) * 1.2945), 40px);
  --px30w: min(calc(30px + (1vw - 19.2px) * 0.6472), 30px);
  --px30: min(calc(30px + (1vw - 19.2px) * 0.9709), 30px);
  --px24: min(calc(24px + (1vw - 19.2px) * 0.6472), 24px);
  --px20: min(calc(20px + (1vw - 19.2px) * 0.6472), 20px);
  --px18: min(calc(18px + (1vw - 19.2px) * 0.2589), 18px);
  --px16: min(calc(16px + (1vw - 19.2px) * 0.1294), 16px);
  --px14: min(calc(14px + (1vw - 19.2px) * 0.1294), 14px);
  --px12: min(calc(12px + (1vw - 19.2px) * 0.0647), 12px);
}
`;
    const INLINE_TAGS = new Set(['a', 'abbr', 'b', 'code', 'em', 'i', 'mark', 'small', 'span', 'strong', 'sub', 'sup']);
    const TEXT_CONTAINER_TAGS = new Set(['a', 'button', 'em', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'label', 'li', 'p', 'small', 'span', 'strong']);
    const input = document.getElementById('json-input');
    const statusEl = document.getElementById('status');
    const importBtn = document.getElementById('btn-import');
    const frame = document.getElementById('render-frame');

    importBtn.addEventListener('click', handleImport);
    document.getElementById('btn-close').addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'CLOSE' } }, '*');
    });

    window.addEventListener('message', (event) => {
      const message = event.data && event.data.pluginMessage;
      if (!message) return;

      if (message.type === 'IMPORT_SUCCESS') {
        setBusy(false);
        setStatus(`「${message.name}」をFigmaに展開しました。`);
      }

      if (message.type === 'IMPORT_ERROR') {
        setBusy(false);
        setStatus(message.message || 'インポートに失敗しました。', true);
      }
    });

    async function handleImport() {
      setBusy(true);
      setStatus('JSONを解析しています...');

      try {
        const component = parsePayload(input.value);
        const root = await renderAndExtract(component);
        setStatus(`${countNodes(root)} ノードをFigmaへ送信しています...`);

        parent.postMessage({
          pluginMessage: {
            type: 'CREATE_NODES',
            payload: { name: component.name, root },
          },
        }, '*');
      } catch (error) {
        setBusy(false);
        setStatus(error instanceof Error ? error.message : 'インポートに失敗しました。', true);
      }
    }

    function parsePayload(raw) {
      if (typeof raw !== 'string' || raw.trim() === '') {
        throw new Error('コンポーネントJSONを貼り付けてください。');
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (error) {
        throw new Error('JSONの形式が不正です。カタログサイトの「Figma」ボタンでコピーした内容を貼り付けてください。');
      }

      const payload = {
        name: parsed && typeof parsed.name === 'string' ? parsed.name : 'Imported Component',
        html: parsed && typeof parsed.html === 'string' ? parsed.html : '',
        css: parsed && typeof parsed.css === 'string' ? parsed.css : '',
      };

      if (payload.html.trim() === '') {
        throw new Error('html が空です。');
      }

      return payload;
    }

    async function renderAndExtract(component) {
      frame.style.width = `${VIEWPORT_WIDTH}px`;
      frame.style.height = '2400px';
      await loadSrcdoc(buildSrcdoc(component));

      const doc = frame.contentDocument;
      const rootEl = doc.getElementById('figma-component-root');
      if (!rootEl) {
        throw new Error('レンダリング用の root 要素を作成できませんでした。');
      }

      await waitForAssets(doc);
      await nextFrame(frame.contentWindow);
      await nextFrame(frame.contentWindow);

      const origin = collectBounds(rootEl);
      return extractElementNode(rootEl, origin, true, component.name);
    }

    function loadSrcdoc(srcdoc) {
      return new Promise((resolve, reject) => {
        frame.onload = () => resolve();
        frame.onerror = () => reject(new Error('iframe の描画に失敗しました。'));
        frame.srcdoc = srcdoc;
      });
    }

    function buildSrcdoc(component) {
      const trimmed = component.html.trimStart();
      // section/main 等のレイアウト系タグ、または <div class="post"> + package_parts ラッパー形式を全幅レイアウトとして扱う
      const isLayoutTag = /^<(section|header|main|footer|nav|article)[\s>]/i.test(trimmed)
        || (/^<div\b[^>]*\bclass="[^"]*\bpost\b/.test(trimmed) && /class="[^"]*\bpackage_parts\b/.test(trimmed));
      const rootStyle = isLayoutTag
        ? `position:relative;display:block;width:${VIEWPORT_WIDTH}px;min-width:${VIEWPORT_WIDTH}px;`
        : 'position:relative;display:inline-block;';

      return [
        '<!DOCTYPE html>',
        '<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>',
        COMPONENT_CSS_VARIABLES,
        '*,*::before,*::after{box-sizing:border-box;}',
        'html,body{margin:0;padding:0;background:#fff;}',
        'body{font-family:var(--body-font-family,"Noto Sans JP",sans-serif);font-size:var(--body-font-size,14px);color:var(--color-font,#111);}',
        // UA スタイルシートの差異により Figma の Chromium が details の非表示を適用しない場合があるため明示的に強制する
        'details:not([open])>*:not(summary){display:none!important;}',
        'summary{list-style:none;}summary::-webkit-details-marker{display:none;}',
        '#figma-component-root{', rootStyle, '}',
        component.css,
        '</style></head><body><div id="figma-component-root">',
        component.html,
        '</div></body></html>',
      ].join('');
    }

    async function waitForAssets(doc) {
      const fontsReady = doc.fonts && doc.fonts.ready
        ? doc.fonts.ready.catch(function () { return undefined; })
        : Promise.resolve();
      const imageTasks = Array.from(doc.images || []).map((image) => {
        if (image.complete) return Promise.resolve();
        return new Promise((resolve) => {
          image.addEventListener('load', resolve, { once: true });
          image.addEventListener('error', resolve, { once: true });
        });
      });

      await Promise.all([fontsReady, ...imageTasks]);
    }

    function collectBounds(rootEl) {
      const rects = [];
      const rootRect = rootEl.getBoundingClientRect();
      if (rootRect.width > 0 && rootRect.height > 0) rects.push(rootRect);

      for (const element of rootEl.querySelectorAll('*')) {
        const style = getComputedStyle(element);
        if (style.display === 'none' || style.visibility === 'hidden') continue;
        const rect = element.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) rects.push(rect);
        rects.push(...collectPseudoRects(element));
      }

      if (rects.length === 0) {
        return { left: 0, top: 0, width: 1, height: 1 };
      }

      const left = Math.min(...rects.map((rect) => rect.left));
      const top = Math.min(...rects.map((rect) => rect.top));
      const right = Math.max(...rects.map((rect) => rect.right));
      const bottom = Math.max(...rects.map((rect) => rect.bottom));
      return { left, top, width: round(right - left), height: round(bottom - top) };
    }

    function extractElementNode(element, origin, isRoot = false, overrideName = '') {
      const style = getComputedStyle(element);
      if (style.display === 'none' || style.visibility === 'hidden') return null;

      const rect = element.getBoundingClientRect();
      if (!isRoot && (rect.width <= 0 || rect.height <= 0)) return null;

      const tagName = element.tagName.toLowerCase();
      if (tagName === 'img') {
        return {
          kind: 'image',
          name: overrideName || buildElementName(element),
          tagName,
          x: round(rect.left - origin.left),
          y: round(rect.top - origin.top),
          width: round(rect.width),
          height: round(rect.height),
          src: element.currentSrc || element.getAttribute('src') || '',
          textContent: '',
          styles: extractStyleSnapshot(style),
          layoutItem: extractLayoutItemSnapshot(style),
          children: [],
        };
      }

      if (shouldExtractAsSingleText(element, style, isRoot)) {
        return buildTextNodeFromElement(element, origin, overrideName);
      }

      const children = [];
      children.push(...extractPseudoNodes(element, origin));
      for (const childNode of Array.from(element.childNodes)) {
        if (childNode.nodeType === Node.ELEMENT_NODE) {
          const child = extractElementNode(childNode, origin);
          if (child) children.push(child);
        }
        if (childNode.nodeType === Node.TEXT_NODE) {
          const child = extractTextNode(childNode, origin, element);
          if (child) children.push(child);
        }
      }

      const styles = extractStyleSnapshot(style);
      const layout = buildAutoLayoutData(element, style, children, rect);
      const hasBox = hasVisibleBackground(styles.backgroundColor) || hasVisibleBorderSnapshot({
        colors: styles.borderColors,
        styles: styles.borderStyles,
        widths: styles.borderWidths,
      });
      const keepFrame = isRoot
        || hasBox
        || Boolean(layout)
        || styles.overflowHidden
        || styles.opacity < 1
        || style.transform !== 'none'
        || children.some((child) => child.kind !== 'text')
        || !INLINE_TAGS.has(tagName);

      if (!keepFrame && children.length === 1 && children[0].kind === 'text') {
        return children[0];
      }

      if (!keepFrame && children.length === 0) {
        return null;
      }

      return {
        kind: children.length === 0 ? 'rectangle' : 'frame',
        name: overrideName || buildElementName(element),
        tagName,
        x: isRoot ? 0 : round(rect.left - origin.left),
        y: isRoot ? 0 : round(rect.top - origin.top),
        width: isRoot ? origin.width : round(rect.width),
        height: isRoot ? origin.height : round(rect.height),
        src: '',
        textContent: '',
        styles,
        layout,
        layoutItem: extractLayoutItemSnapshot(style),
        children,
      };
    }

    function extractTextNode(textNode, origin, parentElement) {
      const style = getComputedStyle(parentElement);
      const textContent = normalizeText(textNode.textContent || '', style.whiteSpace, false);
      if (textContent.trim() === '') return null;

      const range = textNode.ownerDocument.createRange();
      range.selectNodeContents(textNode);
      const rects = Array.from(range.getClientRects()).filter((rect) => rect.width > 0 && rect.height > 0);
      if (rects.length === 0) return null;

      const bounds = unionRects(rects);
      return {
        kind: 'text',
        name: buildTextName(textContent),
        tagName: '#text',
        x: round(bounds.left - origin.left),
        y: round(bounds.top - origin.top),
        width: round(bounds.width),
        height: round(bounds.height),
        src: '',
        textContent,
        styles: extractTextStyles(style),
        layoutItem: extractLayoutItemSnapshot(null),
        children: [],
      };
    }

    function extractStyleSnapshot(style) {
      const border = extractBorderSnapshot(style);
      return {
        backgroundColor: style.backgroundColor,
        backgroundImageColor: extractGradientFirstColor(style.backgroundImage),
        borderColor: border.color,
        borderColors: border.colors,
        borderStyles: border.styles,
        borderTopLeftRadius: parsePx(style.borderTopLeftRadius),
        borderTopRightRadius: parsePx(style.borderTopRightRadius),
        borderBottomRightRadius: parsePx(style.borderBottomRightRadius),
        borderBottomLeftRadius: parsePx(style.borderBottomLeftRadius),
        borderWidths: border.widths,
        color: style.color,
        fontFamily: style.fontFamily,
        fontSize: parsePx(style.fontSize),
        fontStyle: style.fontStyle,
        fontWeight: normalizeFontWeight(style.fontWeight),
        letterSpacing: parsePx(style.letterSpacing),
        lineHeight: parsePx(style.lineHeight),
        objectFit: style.objectFit,
        opacity: parseFloat(style.opacity) || 1,
        overflowHidden: ['hidden', 'clip'].includes(style.overflow) || ['hidden', 'clip'].includes(style.overflowX) || ['hidden', 'clip'].includes(style.overflowY),
        textAlign: style.textAlign,
        cssTransformRotation: extractRotationDegFromTransform(style.transform),
        boxShadows: parseBoxShadow(style.boxShadow),
      };
    }

    // linear-gradient(...) から最初の rgba/rgb 色値を抽出する
    function extractGradientFirstColor(backgroundImage) {
      if (typeof backgroundImage !== 'string' || backgroundImage === 'none') return null;
      const match = backgroundImage.match(/rgba?\(\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*(?:,\s*[\d.]+\s*)?\)/i);
      return match ? match[0] : null;
    }

    // CSS transform から回転角度（度数）を抽出する
    // ブラウザはcomputed styleをmatrix()形式で返すため、matrix成分から角度を計算する
    function extractRotationDegFromTransform(transform) {
      if (typeof transform !== 'string' || !transform || transform === 'none') return 0;
      const m = transform.match(/^matrix\(\s*([-\d.e]+)\s*,\s*([-\d.e]+)/i);
      if (m) {
        const a = parseFloat(m[1]);
        const b = parseFloat(m[2]);
        const deg = Math.atan2(b, a) * (180 / Math.PI);
        return Math.round(deg * 100) / 100;
      }
      const direct = transform.match(/rotate\(\s*([-\d.]+)deg\s*\)/i);
      if (direct) return parseFloat(direct[1]);
      return 0;
    }

    // CSS transform から Y 方向の平行移動量（px）を抽出する
    // translateY(-70%) rotate(45deg) → matrix(..., 0, ty) の ty を返す
    function extractTranslateYPxFromTransform(transform) {
      if (typeof transform !== 'string' || !transform || transform === 'none') return 0;
      const m = transform.match(/^matrix\(\s*[-\d.e]+\s*,\s*[-\d.e]+\s*,\s*[-\d.e]+\s*,\s*[-\d.e]+\s*,\s*([-\d.e]+)\s*,\s*([-\d.e]+)/i);
      if (m) return parseFloat(m[2]);
      const direct = transform.match(/translateY\(\s*([-\d.]+)px\s*\)/i);
      if (direct) return parseFloat(direct[1]);
      return 0;
    }

    // box-shadow を構造化データの配列にパースする
    function parseBoxShadow(boxShadow) {
      if (typeof boxShadow !== 'string' || !boxShadow || boxShadow === 'none') return [];
      const parts = splitBoxShadows(boxShadow);
      return parts.map(parseSingleBoxShadow).filter(Boolean);
    }

    // box-shadow 値をカンマ分割する（rgba() 内のカンマは無視）
    function splitBoxShadows(value) {
      const parts = [];
      let depth = 0;
      let current = '';
      for (let i = 0; i < value.length; i++) {
        const ch = value[i];
        if (ch === '(') depth++;
        else if (ch === ')') depth--;
        else if (ch === ',' && depth === 0) {
          parts.push(current.trim());
          current = '';
          continue;
        }
        current += ch;
      }
      if (current.trim()) parts.push(current.trim());
      return parts;
    }

    // シャドウ1件をパースして { offsetX, offsetY, blur, spread, color, isInset } を返す
    function parseSingleBoxShadow(shadow) {
      const isInset = /\binset\b/i.test(shadow);
      let str = shadow.replace(/\binset\b/gi, '').trim();

      // 色を抽出（rgba/rgb）
      const colorMatch = str.match(/rgba?\([^)]+\)/i);
      const colorStr = colorMatch ? colorMatch[0] : null;
      if (colorStr) str = str.replace(colorStr, '').trim();

      // 残りの px 値（offsetX offsetY blur spread）をパース
      const values = str.split(/\s+/).filter(Boolean).map(t => parsePx(t)).filter(v => v !== null);
      if (values.length < 2) return null;

      const [offsetX = 0, offsetY = 0, blur = 0, spread = 0] = values;

      // 色を {r,g,b,a} (0–1) に変換
      let color = { r: 0, g: 0, b: 0, a: 0.25 };
      if (colorStr) {
        const m = colorStr.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)(?:\s*,\s*([\d.]+))?\s*\)/i);
        if (m) {
          color = {
            r: parseFloat(m[1]) / 255,
            g: parseFloat(m[2]) / 255,
            b: parseFloat(m[3]) / 255,
            a: m[4] !== undefined ? parseFloat(m[4]) : 1,
          };
        }
      }

      return { offsetX, offsetY, blur, spread, color, isInset };
    }

    function extractTextStyles(style) {
      return {
        backgroundColor: 'transparent',
        borderColor: 'transparent',
        borderColors: {
          top: 'transparent',
          right: 'transparent',
          bottom: 'transparent',
          left: 'transparent',
        },
        borderStyles: {
          top: 'none',
          right: 'none',
          bottom: 'none',
          left: 'none',
        },
        borderTopLeftRadius: 0,
        borderTopRightRadius: 0,
        borderBottomRightRadius: 0,
        borderBottomLeftRadius: 0,
        borderWidths: { top: 0, right: 0, bottom: 0, left: 0 },
        color: style.color,
        fontFamily: style.fontFamily,
        fontSize: parsePx(style.fontSize),
        fontStyle: style.fontStyle,
        fontWeight: normalizeFontWeight(style.fontWeight),
        letterSpacing: parsePx(style.letterSpacing),
        lineHeight: parsePx(style.lineHeight),
        objectFit: '',
        opacity: parseFloat(style.opacity) || 1,
        overflowHidden: false,
        textAlign: style.textAlign,
      };
    }

    function shouldExtractAsSingleText(element, style, isRoot) {
      if (isRoot) return false;

      const tagName = element.tagName.toLowerCase();
      if (!TEXT_CONTAINER_TAGS.has(tagName)) return false;
      if (hasVisiblePseudoElement(element)) return false;

      const text = normalizeText(element.innerText || element.textContent || '', style.whiteSpace, true).trim();
      if (!text) return false;

      if (hasVisibleBackground(style.backgroundColor)) return false;
      if (hasVisibleBorderSnapshot(extractBorderSnapshot(style))) return false;

      for (const child of Array.from(element.children)) {
        const childTag = child.tagName.toLowerCase();
        if (childTag === 'br') continue;
        if (!INLINE_TAGS.has(childTag)) return false;
      }

      return true;
    }

    function buildTextNodeFromElement(element, origin, overrideName) {
      const style = getComputedStyle(element);
      const rect = element.getBoundingClientRect();
      const textContent = normalizeText(element.innerText || element.textContent || '', style.whiteSpace, true).trim();
      if (!textContent) return null;

      return {
        kind: 'text',
        name: overrideName || buildTextName(textContent),
        tagName: element.tagName.toLowerCase(),
        x: round(rect.left - origin.left),
        y: round(rect.top - origin.top),
        width: round(rect.width),
        height: round(rect.height),
        src: '',
        textContent,
        styles: extractTextStyles(style),
        layoutItem: extractLayoutItemSnapshot(style),
        children: [],
      };
    }

    function extractPseudoNodes(element, origin) {
      const nodes = [];
      const beforeNode = buildPseudoNode(element, origin, 'before');
      const afterNode = buildPseudoNode(element, origin, 'after');

      if (beforeNode) nodes.push(beforeNode);
      if (afterNode) nodes.push(afterNode);

      return nodes;
    }

    function collectPseudoRects(element) {
      const rects = [];
      const beforeRect = getPseudoRect(element, 'before');
      const afterRect = getPseudoRect(element, 'after');

      if (beforeRect) rects.push(beforeRect);
      if (afterRect) rects.push(afterRect);

      return rects;
    }

    function buildPseudoNode(element, origin, pseudoType) {
      const pseudoStyle = getComputedStyle(element, `::${pseudoType}`);
      if (!isVisiblePseudo(pseudoStyle)) return null;

      const rect = getPseudoRect(element, pseudoType, pseudoStyle);
      if (!rect) return null;

      // CSS transform の translateY 分だけ Y 座標を補正する
      // getPseudoRect は CSS position (top/right 等) のみで座標を計算するため、
      // transform による視覚的な移動量（matrix の ty 成分）を手動で加算する
      const transformY = extractTranslateYPxFromTransform(pseudoStyle.transform);

      const content = normalizePseudoContent(pseudoStyle.content);
      const name = `${buildElementName(element)}::${pseudoType}`;

      if (content) {
        return {
          kind: 'text',
          name,
          tagName: `::${pseudoType}`,
          x: round(rect.left - origin.left),
          y: round(rect.top - origin.top + transformY),
          width: round(rect.width),
          height: round(rect.height),
          src: '',
          textContent: normalizeText(content, pseudoStyle.whiteSpace, true),
          styles: extractTextStyles(pseudoStyle),
          layoutItem: extractLayoutItemSnapshot(pseudoStyle),
          children: [],
        };
      }

      return {
        kind: 'rectangle',
        name,
        tagName: `::${pseudoType}`,
        x: round(rect.left - origin.left),
        y: round(rect.top - origin.top + transformY),
        width: round(rect.width),
        height: round(rect.height),
        src: '',
        textContent: '',
        styles: extractStyleSnapshot(pseudoStyle),
        layoutItem: extractLayoutItemSnapshot(pseudoStyle),
        children: [],
      };
    }

    function buildAutoLayoutData(element, style, children, rect) {
      if (!isAutoLayoutCandidate(element, style, children)) return null;

      const direction = style.flexDirection || 'row';
      const isHorizontal = direction.indexOf('row') === 0;
      const reverse = direction.indexOf('reverse') !== -1;
      const wrap = style.flexWrap && style.flexWrap !== 'nowrap';
      const flowChildren = children.filter((child) => !child.layoutItem || child.layoutItem.positioning !== 'ABSOLUTE');

      if (flowChildren.length === 0) return null;

      const mainGap = inferAutoLayoutGap(flowChildren, isHorizontal, reverse);
      const parsedColumnGap = parsePx(style.columnGap);
      const parsedRowGap = parsePx(style.rowGap);
      const itemSpacing = isHorizontal
        ? (parsedColumnGap !== null ? parsedColumnGap : mainGap)
        : (parsedRowGap !== null ? parsedRowGap : mainGap);
      const counterAxisSpacing = isHorizontal
        ? (parsedRowGap !== null ? parsedRowGap : 0)
        : (parsedColumnGap !== null ? parsedColumnGap : 0);

      return {
        mode: isHorizontal ? 'HORIZONTAL' : 'VERTICAL',
        reverse,
        wrap,
        primaryAxisAlignItems: mapPrimaryAxisAlign(style.justifyContent),
        counterAxisAlignItems: mapCounterAxisAlign(style.alignItems, isHorizontal),
        alignItemsRaw: style.alignItems || 'stretch',
        itemSpacing: itemSpacing || 0,
        counterAxisSpacing: counterAxisSpacing || 0,
        paddingTop: parsePx(style.paddingTop) || 0,
        paddingRight: parsePx(style.paddingRight) || 0,
        paddingBottom: parsePx(style.paddingBottom) || 0,
        paddingLeft: parsePx(style.paddingLeft) || 0,
        width: round(rect.width),
        height: round(rect.height),
      };
    }

    function isAutoLayoutCandidate(element, style, children) {
      if (!style) return false;
      const modeHint = getAutoLayoutHint(element);
      if (modeHint === 'fixed') return false;
      if (!['flex', 'inline-flex'].includes(style.display)) return false;
      if ((style.flexWrap && style.flexWrap !== 'nowrap') && modeHint !== 'force') return false;
      if (style.position === 'absolute' || style.position === 'fixed') return false;
      if (style.transform && style.transform !== 'none') return false;
      if (style.justifyContent === 'space-around' || style.justifyContent === 'space-evenly') return false;
      if (children.length < 1 && modeHint !== 'force') return false;

      const direction = style.flexDirection || 'row';
      const isHorizontal = direction.indexOf('row') === 0;
      const flowChildren = children.filter((child) => !child.layoutItem || child.layoutItem.positioning !== 'ABSOLUTE');
      if (flowChildren.length < 1 && modeHint !== 'force') return false;
      if (!isOrderedFlow(flowChildren, isHorizontal) && modeHint !== 'force') return false;
      if (hasOverlappingFlow(flowChildren, isHorizontal) && modeHint !== 'force') return false;

      return true;
    }

    function getAutoLayoutHint(element) {
      if (!element || !element.getAttribute) return 'auto';

      const raw = (element.getAttribute('data-figma-layout')
        || element.getAttribute('data-figma-autolayout')
        || '').toLowerCase().trim();

      if (raw === 'fixed' || raw === 'false' || raw === 'off') return 'fixed';
      if (raw === 'force' || raw === 'true' || raw === 'on') return 'force';
      return 'auto';
    }

    function extractLayoutItemSnapshot(style) {
      const source = style || {};
      return {
        positioning: source.position === 'absolute' || source.position === 'fixed' ? 'ABSOLUTE' : 'AUTO',
        alignSelf: source.alignSelf || 'auto',
        flexGrow: normalizeFlexGrow(source.flexGrow),
      };
    }

    function inferAutoLayoutGap(children, isHorizontal, reverse) {
      if (!Array.isArray(children) || children.length < 2) return 0;

      const ordered = [...children].sort((a, b) => {
        const first = isHorizontal ? a.x : a.y;
        const second = isHorizontal ? b.x : b.y;
        return reverse ? second - first : first - second;
      });

      const gaps = [];
      for (let i = 0; i < ordered.length - 1; i += 1) {
        const current = ordered[i];
        const next = ordered[i + 1];
        const currentEnd = isHorizontal ? current.x + current.width : current.y + current.height;
        const nextStart = isHorizontal ? next.x : next.y;
        const gap = round(nextStart - currentEnd);
        if (gap >= 0) gaps.push(gap);
      }

      if (gaps.length === 0) return 0;
      return round(gaps.reduce((sum, value) => sum + value, 0) / gaps.length);
    }

    function isOrderedFlow(children, isHorizontal) {
      if (!Array.isArray(children) || children.length < 2) return true;

      const positions = children.map((child) => isHorizontal ? child.x : child.y);
      let ascending = true;
      let descending = true;

      for (let i = 1; i < positions.length; i += 1) {
        if (positions[i] < positions[i - 1]) ascending = false;
        if (positions[i] > positions[i - 1]) descending = false;
      }

      return ascending || descending;
    }

    function hasOverlappingFlow(children, isHorizontal) {
      if (!Array.isArray(children) || children.length < 2) return false;

      const ordered = [...children].sort((a, b) => {
        const first = isHorizontal ? a.x : a.y;
        const second = isHorizontal ? b.x : b.y;
        return first - second;
      });

      for (let i = 0; i < ordered.length - 1; i += 1) {
        const current = ordered[i];
        const next = ordered[i + 1];
        const currentEnd = isHorizontal ? current.x + current.width : current.y + current.height;
        const nextStart = isHorizontal ? next.x : next.y;
        if (nextStart < currentEnd - 1) return true;
      }

      return false;
    }

    function mapPrimaryAxisAlign(value) {
      switch (value) {
        case 'center':
          return 'CENTER';
        case 'flex-end':
        case 'end':
          return 'MAX';
        case 'space-between':
          return 'SPACE_BETWEEN';
        default:
          return 'MIN';
      }
    }

    function mapCounterAxisAlign(value, isHorizontal) {
      switch (value) {
        case 'center':
          return 'CENTER';
        case 'flex-end':
        case 'end':
          return 'MAX';
        case 'baseline':
          return isHorizontal ? 'BASELINE' : 'MIN';
        default:
          return 'MIN';
      }
    }

    function normalizeFlexGrow(value) {
      const numeric = Number(value);
      return Number.isFinite(numeric) && numeric > 0 ? 1 : 0;
    }

    function getPseudoRect(element, pseudoType, pseudoStyle) {
      const style = pseudoStyle || getComputedStyle(element, `::${pseudoType}`);
      if (!isVisiblePseudo(style)) return null;

      const baseRect = element.getBoundingClientRect();
      const width = resolvePseudoSize(style.width, baseRect.width, style, true);
      const height = resolvePseudoSize(style.height, baseRect.height, style, false);

      if (width <= 0 || height <= 0) return null;

      const left = resolvePseudoPosition(style.left, style.right, baseRect.left, baseRect.right, width);
      const top = resolvePseudoTop(element, pseudoType, style, baseRect, height);

      return {
        left,
        top,
        width,
        height,
      };
    }

    function resolvePseudoTop(element, pseudoType, style, baseRect, height) {
      const explicitTop = resolvePseudoPosition(style.top, style.bottom, baseRect.top, baseRect.bottom, height);
      if (parsePx(style.top) !== null || parsePx(style.bottom) !== null || style.position === 'absolute' || style.position === 'fixed') {
        return explicitTop;
      }

      const marginTop = parsePx(style.marginTop) || 0;
      const marginBottom = parsePx(style.marginBottom) || 0;

      if (pseudoType === 'before') {
        return baseRect.top + marginTop;
      }

      return baseRect.bottom - height - marginBottom;
    }

    function resolvePseudoPosition(startValue, endValue, baseStart, baseEnd, size) {
      const start = parsePx(startValue);
      if (start !== null) return baseStart + start;

      const end = parsePx(endValue);
      if (end !== null) return baseEnd - end - size;

      return baseStart;
    }

    function resolvePseudoSize(value, fallbackSize, style, isHorizontal) {
      const parsed = parsePx(value);
      if (parsed !== null) return parsed;

      const content = normalizePseudoContent(style.content);
      if (!content) return round(fallbackSize);

      const fontSize = parsePx(style.fontSize) || 16;
      if (isHorizontal) {
        return round(Math.max(content.length * fontSize * 0.6, fontSize));
      }

      return round(parsePx(style.lineHeight) || fontSize * 1.2);
    }

    function isVisiblePseudo(style) {
      if (!style) return false;
      if (style.display === 'none' || style.visibility === 'hidden') return false;

      const content = normalizePseudoContent(style.content);
      const hasBgColor = hasVisibleBackground(style.backgroundColor);
      const hasBgImage = hasVisibleBackgroundImage(style.backgroundImage);
      const hasBox = hasBgColor || hasBgImage || hasVisibleBorderSnapshot(extractBorderSnapshot(style));

      if (!content && !hasBox) return false;

      // background-image を持つ絶対配置要素はブラウザのレイアウト計算を信頼してサイズチェックを省略
      if (hasBgImage && (style.position === 'absolute' || style.position === 'fixed')) {
        return true;
      }

      const width = resolvePseudoSize(style.width, 0, style, true);
      const height = resolvePseudoSize(style.height, 0, style, false);
      return width > 0 && height > 0;
    }

    function hasVisibleBackgroundImage(value) {
      return typeof value === 'string' && value !== 'none' && value.trim() !== '';
    }

    function hasVisiblePseudoElement(element) {
      return isVisiblePseudo(getComputedStyle(element, '::before'))
        || isVisiblePseudo(getComputedStyle(element, '::after'));
    }

    function normalizePseudoContent(content) {
      if (typeof content !== 'string') return '';
      if (content === 'none' || content === 'normal') return '';

      const unquoted = content.replace(/^['"]|['"]$/g, '');
      return unquoted
        .replace(/\\A/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\\"/g, '"')
        .replace(/\\\\/g, '\\');
    }

    function normalizeText(text, whiteSpace, preserveLineBreaks) {
      const normalized = String(text)
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .replace(/\u00a0/g, ' ');

      if (/pre-wrap|break-spaces/.test(whiteSpace)) {
        return normalized;
      }

      if (/pre-line/.test(whiteSpace) || preserveLineBreaks) {
        return normalized
          .split('\n')
          .map((line) => line.replace(/[^\S\n]+/g, ' ').trimEnd())
          .join('\n')
          .replace(/\n{3,}/g, '\n\n');
      }

      if (/pre/.test(whiteSpace)) {
        return normalized;
      }

      return normalized.replace(/\s+/g, ' ');
    }

    function hasVisibleBackground(value) {
      return !/^(transparent|rgba\(0,\s*0,\s*0,\s*0\))$/i.test(String(value).replace(/\s+/g, ''));
    }

    function extractBorderSnapshot(style) {
      return {
        color: style.borderColor,
        colors: {
          top: style.borderTopColor,
          right: style.borderRightColor,
          bottom: style.borderBottomColor,
          left: style.borderLeftColor,
        },
        styles: {
          top: style.borderTopStyle,
          right: style.borderRightStyle,
          bottom: style.borderBottomStyle,
          left: style.borderLeftStyle,
        },
        widths: {
          top: parsePx(style.borderTopWidth),
          right: parsePx(style.borderRightWidth),
          bottom: parsePx(style.borderBottomWidth),
          left: parsePx(style.borderLeftWidth),
        },
      };
    }

    function hasVisibleBorderSnapshot(border) {
      if (!border) return false;

      return ['top', 'right', 'bottom', 'left'].some((side) => {
        const width = border.widths && border.widths[side];
        const color = border.colors && border.colors[side];
        const borderStyle = border.styles && border.styles[side];
        return isVisibleBorderSide(width, color, borderStyle);
      });
    }

    function isVisibleBorderSide(width, color, borderStyle) {
      if (!(width > 0)) return false;
      if (borderStyle === 'none' || borderStyle === 'hidden') return false;
      return !/^(transparent|rgba\(0,\s*0,\s*0,\s*0\))$/i.test(String(color).replace(/\s+/g, ''));
    }

    function parsePx(value) {
      if (typeof value !== 'string' || value === '' || value === 'normal' || value === 'auto') return null;
      const match = value.match(/-?[\d.]+/);
      return match ? round(Number(match[0])) : null;
    }

    function normalizeFontWeight(value) {
      if (value === 'normal') return 400;
      if (value === 'bold') return 700;
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric : 400;
    }

    function buildElementName(element) {
      const tagName = element.tagName.toLowerCase();
      if (element.id) return `${tagName}#${element.id}`;
      const firstClass = element.classList[0];
      return firstClass ? `${tagName}.${firstClass}` : tagName;
    }

    function buildTextName(text) {
      const short = text.trim().replace(/\s+/g, ' ').slice(0, 24);
      return short ? `text:${short}` : 'text';
    }

    function unionRects(rects) {
      const left = Math.min(...rects.map((rect) => rect.left));
      const top = Math.min(...rects.map((rect) => rect.top));
      const right = Math.max(...rects.map((rect) => rect.right));
      const bottom = Math.max(...rects.map((rect) => rect.bottom));
      return { left, top, width: round(right - left), height: round(bottom - top) };
    }

    function countNodes(node) {
      return node ? 1 + (node.children || []).reduce((sum, child) => sum + countNodes(child), 0) : 0;
    }

    function nextFrame(win) {
      return new Promise((resolve) => win.requestAnimationFrame(() => resolve()));
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', isError);
    }

    function setBusy(busy) {
      importBtn.disabled = busy;
    }

    function round(value) {
      return Math.round(value * 100) / 100;
    }
  </script>
</body>
